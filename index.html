<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Copa 2026">
<title>Copa del Mundo 2026 - Bracket</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0f1a;
  color:white;
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

h1,h2{text-align:center}

.groups{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.group{
  min-width:240px;
  background:#161b2a;
  padding:10px;
  border-radius:10px;
}

.rankBox{
  font-size:12px;
  background:#0f1422;
  padding:6px;
  border-radius:6px;
  margin-bottom:8px;
}

.teamBtn{
  display:block;
  width:100%;
  margin:4px 0;
  padding:10px 6px;
  min-height:44px;
  background:#0f1422;
  border:1px solid #333;
  color:white;
  border-radius:6px;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  text-align:left;
}

.teamBtn:active{background:#2a7aff;transform:scale(0.97)}

.teamBtn.selected{background:#1f6feb}

.resetBtn,.nextBtn{
  width:100%;
  padding:14px 10px;
  min-height:44px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  color:white;
  font-weight:600;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-user-select:none;
  font-size:16px;
}

.resetBtn:active{opacity:0.75}
.nextBtn:active{opacity:0.75}

.resetBtn{background:#ff3b30}
.nextBtn{background:#1f6feb}

.bottomBtns{
  max-width:260px;
  margin:auto;
  padding:10px;
}

.thirdRanker{
  display:none;
  max-width:260px;
  margin:20px auto;
  background:#161b2a;
  padding:10px;
  border-radius:10px;
}

.thirdItem{
  padding:10px 6px;
  min-height:44px;
  margin:4px 0;
  background:#0f1422;
  border-radius:6px;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  display:flex;
  align-items:center;
}

.thirdItem:active{background:#2a4a8a}
}

.thirdItem.selected{background:#1f6feb}

.rankBadge{
  float:right;
  background:#ffd700;
  color:#000;
  font-size:11px;
  font-weight:700;
  padding:2px 6px;
  border-radius:10px;
  margin-left:8px;
}

.bracket{
  padding:10px 20px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

.round{min-width:200px}

.match{
  background:#161b2a;
  margin:10px 0;
  padding:6px;
  border-radius:8px;
}

.slot{
  padding:8px 6px;
  min-height:28px;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}

.slot:active{opacity:0.7}

.slot.winner{background:#1f6feb}

.vs-divider{
  text-align:center;
  font-size:10px;
  font-weight:700;
  letter-spacing:.08em;
  color:#556;
  padding:1px 0;
}

.flag{
  width:18px;
  margin-right:6px;
}

.roundLabel{
  text-align:center;
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#8899bb;
  margin-bottom:6px;
}

#thirdPlaceArea{
  display:none;
  text-align:center;
  padding:10px 20px;
}

#results{
  display:none;
  text-align:center;
  padding:20px;
  background:#161b2a;
  border-radius:12px;
  margin:20px;
}

#champion{font-size:44px;color:#ffd700;margin:8px 0}
#runnerup{font-size:36px;color:#c0c0c0;margin:8px 0}
#third{font-size:32px;color:#cd7f32;margin:8px 0}

.shareBtn{
  display:inline-block;
  margin-top:14px;
  padding:14px 32px;
  min-height:44px;
  background:#34c759;
  border:none;
  border-radius:10px;
  color:white;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-user-select:none;
}

.shareBtn:active{background:#28a745;transform:scale(0.97)}

#bracket .match{padding:3px;}
#bracket .slot{padding:3px 5px;min-height:0;font-size:11px;line-height:1.3;}
#bracket .flag{width:13px;margin-right:3px;}
#bracket .roundLabel{font-size:10px;}
</style>
</head>

<h1 style="padding-top:max(16px,env(safe-area-inset-top))">⚽ Copa del Mundo 2026 - Bracket</h1>

<div id="posterArea">

<div id="groups" class="groups"></div>

<h2>Fase Eliminatoria</h2>
<div id="bracket" class="bracket"></div>

<div id="thirdPlaceArea"></div>

<div id="results">

  <div id="champion"></div>
  <div id="runnerup"></div>
  <div id="third"></div>
  <button class="shareBtn" onclick="shareResults(this)">Compartir mi Bracket</button>
</div>

</div>

<div class="bottomBtns">
<button class="resetBtn" onclick="location.reload()">Reiniciar</button>
</div>

function init(){
  const c=document.getElementById("groups");

  Object.keys(groups).forEach(g=>{
    picks[g]=[];
    const box=document.createElement("div");
    box.className="group";

    box.innerHTML=`
      <h3>Grupo ${g}</h3>
      <div id="rank-${g}" class="rankBox">1° -<br>2° -<br>3° -<br>4° -</div>
      ${groups[g].map(t=>
        `<button class="teamBtn" onclick="pick('${g}','${t}',this)">
          ${renderTeam(t)}
        </button>`
      ).join("")}
    `;

    c.appendChild(box);
  });
}

function pick(g,t,el){
  if(picks[g].includes(t)){
    picks[g]=picks[g].filter(x=>x!==t);
    el.classList.remove("selected");
  } else {
    if(picks[g].length>=4) return;
    picks[g].push(t);
    el.classList.add("selected");
  }

  update(g);

  if(Object.values(picks).every(x=>x.length===4)){
    prepareThird();
  }
}

function update(g){
  const r=picks[g];

  document.getElementById("rank-"+g).innerHTML=
  `1° ${renderTeam(r[0])}<br>
   2° ${renderTeam(r[1])}<br>
   3° ${renderTeam(r[2])}<br>
   4° ${renderTeam(r[3])}`;
}

/* THIRD PLACE */
const thirdDivMap={};
const ordinals=["1°","2°","3°","4°","5°","6°","7°","8°"];

function refreshThirdRanks(){
  Object.entries(thirdDivMap).forEach(([t,div])=>{
    const idx=selectedThird.findIndex(x=>x.team===t);
    let badge=div.querySelector(".rankBadge");
    if(idx>-1){
      div.classList.add("selected");
      if(!badge){badge=document.createElement("span");badge.className="rankBadge";div.appendChild(badge);}
      badge.textContent=ordinals[idx];
    } else {
      div.classList.remove("selected");
      if(badge) badge.remove();
    }
  });
}

function prepareThird(){
  const list=document.getElementById("thirdList");
  list.innerHTML="";
  selectedThird=[];
  Object.keys(thirdDivMap).forEach(k=>delete thirdDivMap[k]);

  Object.entries(picks).forEach(([g,arr])=>{
    const t=arr[2];

    const div=document.createElement("div");
    div.className="thirdItem";
    div.innerHTML=renderTeam(t);
    thirdDivMap[t]=div;

    div.onclick=()=>{
      const i=selectedThird.findIndex(x=>x.team===t);
      if(i>-1){
        selectedThird.splice(i,1);
      } else {
        if(selectedThird.length>=8) return;
        selectedThird.push({team:t,group:g});
      }
      refreshThirdRanks();
      document.getElementById("buildBtn").disabled=selectedThird.length!==8;
    };

    list.appendChild(div);
  });

  document.getElementById("thirdUI").style.display="block";
}

/* FIND FIFA COMBINATION */
function getCombination(thirdTeams){
  const groups = thirdTeams.map(t=>t.group).sort().join("");

  return THIRD_COMBINATIONS.find(c=>{
    const used = Object.values(c)
      .filter(v=>v.startsWith("3"))
      .map(v=>v[1])
      .sort()
      .join("");

    return used===groups;
  });
}

/* BUILD */
function build(){

  const first=[], second=[], third=[];

  Object.entries(picks).forEach(([g,arr])=>{
    first.push({team:arr[0],group:g});
    second.push({team:arr[1],group:g});
  });

  selectedThird.forEach(t=>{
    third.push({team:t.team,group:t.group});
  });

  const firstMap={}, secondMap={}, thirdMap={};

  first.forEach(t=>firstMap[t.group]=t.team);
  second.forEach(t=>secondMap[t.group]=t.team);
  third.forEach(t=>thirdMap[t.group]=t.team);

  const combo = getCombination(third);

  if(!combo){
    console.error("No FIFA combination found");
    return;
  }

  function resolve(code){

    if(!code) return null;

    if(code.startsWith("3")){
      return thirdMap[code[1]];
    }

    if(code[1]==="1"){
      return firstMap[code[0]];
    }

    if(code[1]==="2"){
      return secondMap[code[0]];
    }

    if(code.startsWith("1")){
      const mapped = combo[code]; // "1A" -> "3E"
      if(mapped){
        return thirdMap[mapped[1]];
      }
    }

    return null;
  }

  const TEMPLATE=[
    ["A2","B2"],["F1","C2"],
    ["E1","1E"],["I1","1I"],
    ["K2","L2"],["H1","J2"],
    ["D1","1D"],["G1","1G"],
    ["C1","F2"],["E2","I2"],
    ["A1","1A"],["L1","1L"],
    ["B1","1B"],["K1","1K"],
    ["D2","G2"],["J1","H2"]
  ];

  const r32=TEMPLATE.map(m=>[
    resolve(m[0]),
    resolve(m[1])
  ]);

  rounds=[];
  rounds[0]=r32.map(m=>({teams:m,winner:null}));
  rounds[1]=Array(8).fill(0).map(()=>({teams:[null,null],winner:null}));
  rounds[2]=Array(4).fill(0).map(()=>({teams:[null,null],winner:null}));
  rounds[3]=Array(2).fill(0).map(()=>({teams:[null,null],winner:null}));
  rounds[4]=Array(1).fill(0).map(()=>({teams:[null,null],winner:null}));
  thirdPlaceMatch={teams:[null,null],winner:null};

  draw();
}

function selectWinner(r,m,i){
  const match=rounds[r][m];
  const winner=match.teams[i];
  const loser=match.teams[1-i];
  match.winner=winner;

  if(r<4){
    const next=Math.floor(m/2);
    const slot=m%2;
    rounds[r+1][next].teams[slot]=winner;
  }

  // SF losers feed the 3rd place match
  if(r===3){
    thirdPlaceMatch.teams[m]=loser;
    thirdPlaceMatch.winner=null;
  }

  draw();
  checkComplete();
}

function selectThirdWinner(i){
  thirdPlaceMatch.winner=thirdPlaceMatch.teams[i];
  draw();
  checkComplete();
}

function draw(){
  const b=document.getElementById("bracket");
  b.innerHTML="";

  const MH=54, MW=138, CW=168, SH=68, STUB=11;
  const TOTAL=16*SH;
  const LCOL="#3a4a6b";
  const labels=["R32","R16","Cuartos","Semis","Final"];

  // Label row
  const lrow=document.createElement("div");
  lrow.style.cssText=`display:flex;padding-bottom:6px;`;
  labels.forEach(l=>{
    const d=document.createElement("div");
    d.className="roundLabel";
    d.textContent=l;
    d.style.cssText=`width:${CW}px;flex-shrink:0;`;
    lrow.appendChild(d);
  });
  b.appendChild(lrow);

  // Bracket body
  const body=document.createElement("div");
  body.style.cssText=`position:relative;height:${TOTAL}px;width:${5*CW}px;`;
  b.appendChild(body);

  // SVG overlay for connector lines
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",5*CW);
  svg.setAttribute("height",TOTAL);
  svg.style.cssText=`position:absolute;top:0;left:0;pointer-events:none;overflow:visible;`;
  body.appendChild(svg);

  function line(x1,y1,x2,y2){
    const el=document.createElementNS("http://www.w3.org/2000/svg","line");
    el.setAttribute("x1",x1); el.setAttribute("y1",y1);
    el.setAttribute("x2",x2); el.setAttribute("y2",y2);
    el.setAttribute("stroke",LCOL);
    el.setAttribute("stroke-width","2");
    el.setAttribute("stroke-linecap","round");
    svg.appendChild(el);
  }

  rounds.forEach((r,ri)=>{
    const slot=SH*Math.pow(2,ri);
    r.forEach((m,mi)=>{
      const top=mi*slot+(slot-MH)/2;
      const cy=top+MH/2;

      // Match card
      const d=document.createElement("div");
      d.className="match";
      d.style.cssText=`position:absolute;top:${top}px;left:${ri*CW}px;width:${MW}px;height:${MH}px;box-sizing:border-box;overflow:hidden;margin:0;`;
      d.innerHTML=`
        <div class="slot ${m.winner===m.teams[0]?'winner':''}" onclick="selectWinner(${ri},${mi},0)">
          ${renderTeam(m.teams[0])}
        </div>
        <div class="slot ${m.winner===m.teams[1]?'winner':''}" onclick="selectWinner(${ri},${mi},1)">
          ${renderTeam(m.teams[1])}
        </div>`;
      body.appendChild(d);

      // SVG connector from previous round to this match
      if(ri>0){
        const ps=SH*Math.pow(2,ri-1);
        const y0=(2*mi+0.5)*ps;   // child 0 center
        const y1=(2*mi+1.5)*ps;   // child 1 center
        const xR=(ri-1)*CW+MW;    // right edge of child col
        const xJ=xR+STUB;           // vertical bar x (in the gap)
        const xL=ri*CW;           // left edge of this col
        line(xR,y0,xJ,y0);        // stub right from child 0
        line(xR,y1,xJ,y1);        // stub right from child 1
        line(xJ,y0,xJ,y1);        // vertical bar
        line(xJ,cy,xL,cy);        // horizontal line to this match
      }
    });
  });

  // 3rd place match
  const tp=document.getElementById("thirdPlaceArea");
  const t=thirdPlaceMatch;
  if(t.teams[0]||t.teams[1]){
    tp.style.display="block";
    tp.innerHTML=`
      <h2>Partido por el 3er Lugar</h2>
      <div class="match" style="max-width:240px;margin:auto">
        <div class="slot ${t.winner===t.teams[0]?'winner':''}" onclick="selectThirdWinner(0)">
          ${renderTeam(t.teams[0])||'TBD'}
        </div>
        <div class="slot ${t.winner===t.teams[1]?'winner':''}" onclick="selectThirdWinner(1)">
          ${renderTeam(t.teams[1])||'TBD'}
        </div>
      </div>`;
  } else {
    tp.style.display="none";
  }
}

function checkComplete(){
  const finalMatch=rounds[4]?.[0];
  if(!finalMatch?.winner || !thirdPlaceMatch.winner) return;

  const champion=finalMatch.winner;
  const runnerup=finalMatch.teams[0]===champion ? finalMatch.teams[1] : finalMatch.teams[0];
  const third=thirdPlaceMatch.winner;

  document.getElementById("champion").innerHTML=`🥇 ${renderTeam(champion)}`;
  document.getElementById("runnerup").innerHTML=`🥈 ${renderTeam(runnerup)}`;
  document.getElementById("third").innerHTML=`🥉 ${renderTeam(third)}`;
  document.getElementById("results").style.display="block";
  document.getElementById("results").scrollIntoView({behavior:"smooth",block:"center"});
}

        if(navigator.canShare?.({files:[file]})){
          try{ await navigator.share({title:'Mi Bracket Copa del Mundo 2026',files:[file]}); }
          catch(e){ if(e.name!=='AbortError') dlCanvas(canvas); }
        } else {
          dlCanvas(canvas);
        }
        btn.textContent='Compartir mi Bracket';
        btn.disabled=false;
      },'image/png');

    } catch(e){
      if(document.body.contains(wrapper)) document.body.removeChild(wrapper);
      btn.textContent='Compartir mi Bracket';
      btn.disabled=false;
      alert('No se pudo generar la imagen.');
    }
  }));
}

function dlCanvas(canvas){
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='wc2026-bracket.png';
  a.click();
}

init();

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
