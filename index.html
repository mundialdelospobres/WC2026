<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Bracket</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0f1a;
  color:white;
}

h1,h2{text-align:center}

.groups{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.group{
  min-width:240px;
  background:#161b2a;
  padding:10px;
  border-radius:10px;
}

.rankBox{
  font-size:12px;
  background:#0f1422;
  padding:6px;
  border-radius:6px;
  margin-bottom:8px;
}

.teamBtn{
  display:block;
  width:100%;
  margin:4px 0;
  padding:6px;
  background:#0f1422;
  border:1px solid #333;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.teamBtn.selected{background:#1f6feb}

.resetBtn,.nextBtn{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.resetBtn{background:#ff3b30}
.nextBtn{background:#1f6feb}

.bottomBtns{
  max-width:260px;
  margin:auto;
  padding:10px;
}

.thirdRanker{
  display:none;
  padding:10px;
}

.thirdItem{
  padding:8px;
  margin:5px;
  background:#161b2a;
  border-radius:6px;
  cursor:pointer;
}

.thirdItem.selected{background:#1f6feb}

.bracket{
  display:flex;
  gap:40px;
  padding:20px;
}

.round{min-width:200px}

.match{
  background:#161b2a;
  margin:10px 0;
  padding:6px;
  border-radius:8px;
}

.slot{
  padding:6px;
  cursor:pointer;
}

.slot.winner{background:#1f6feb}

.flag{
  width:18px;
  margin-right:6px;
}

/* RESULTS */
#results{
  display:none;
  text-align:center;
  padding:20px;
  background:#161b2a;
  border-radius:12px;
  margin:20px;
}

#champion{
  font-size:22px;
  color:#ffd700;
  margin:10px;
}

#runnerup{
  font-size:18px;
  color:#c0c0c0;
  opacity:0.9;
}
</style>
</head>

<body>

<h1>⚽ World Cup 2026 Bracket</h1>

<div id="groups" class="groups"></div>

<div id="thirdUI" class="thirdRanker">
  <h2>Select Best 8 Third-Place Teams</h2>

  <div id="thirdCount" style="text-align:center;margin:10px;"></div>
  <div id="thirdList"></div>

  <button id="buildBtn" class="nextBtn" onclick="build()" disabled>
    Build Knockout
  </button>
</div>

<h2>Knockout Stage</h2>
<div id="bracket" class="bracket"></div>

<div id="results">
  <h2>🏆 Tournament Complete</h2>
  <div id="champion"></div>
  <div id="runnerup"></div>
</div>

<div class="bottomBtns">
<button class="resetBtn" onclick="location.reload()">Reset</button>
</div>

<script>

/* FLAGS */
const flags={
Czechia:"cz","South Korea":"kr",Mexico:"mx","South Africa":"za",
Switzerland:"ch",Canada:"ca","Bosnia and Herzegovina":"ba",Qatar:"qa",
Brazil:"br",Morocco:"ma","Scotland":"gb",Haiti:"ht",
"United States":"us",Turkey:"tr",Paraguay:"py",Australia:"au",
Germany:"de",Ecuador:"ec","Ivory Coast":"ci","Curaçao":"cw",
Netherlands:"nl",Japan:"jp",Sweden:"se",Tunisia:"tn",
Belgium:"be",Egypt:"eg",Iran:"ir","New Zealand":"nz",
Spain:"es",Uruguay:"uy","Saudi Arabia":"sa","Cape Verde":"cv",
France:"fr",Norway:"no",Senegal:"sn",Iraq:"iq",
Argentina:"ar",Austria:"at",Algeria:"dz",Jordan:"jo",
Portugal:"pt",Colombia:"co","Congo DR":"cd",Uzbekistan:"uz",
England:"gb",Croatia:"hr",Ghana:"gh",Panama:"pa"
};

function renderTeam(n){
  return n ? `<img src="https://flagcdn.com/w40/${flags[n]}.png" class="flag">${n}` : "";
}

/* GROUPS */
const groups={
A:["Czechia","South Korea","Mexico","South Africa"],
B:["Switzerland","Canada","Bosnia and Herzegovina","Qatar"],
C:["Brazil","Morocco","Scotland","Haiti"],
D:["United States","Turkey","Paraguay","Australia"],
E:["Germany","Ecuador","Ivory Coast","Curaçao"],
F:["Netherlands","Japan","Sweden","Tunisia"],
G:["Belgium","Egypt","Iran","New Zealand"],
H:["Spain","Uruguay","Saudi Arabia","Cape Verde"],
I:["France","Norway","Senegal","Iraq"],
J:["Argentina","Austria","Algeria","Jordan"],
K:["Portugal","Colombia","Congo DR","Uzbekistan"],
L:["England","Croatia","Ghana","Panama"]
};

let picks={},selectedThird=[],rounds=[];

/* INIT */
function init(){
  const c=document.getElementById("groups");

  Object.keys(groups).forEach(g=>{
    picks[g]=[];

    const box=document.createElement("div");
    box.className="group";

    box.innerHTML=`
      <h3>Group ${g}</h3>
      <div id="rank-${g}" class="rankBox">1st -<br>2nd -<br>3rd -<br>4th -</div>
      ${groups[g].map(t=>`
        <button class="teamBtn" onclick="pick('${g}','${t}',this)">
          ${renderTeam(t)}
        </button>`).join("")}
    `;

    c.appendChild(box);
  });
}

function pick(g,t,el){
  if(picks[g].includes(t)){
    picks[g]=picks[g].filter(x=>x!==t);
    el.classList.remove("selected");
  } else {
    if(picks[g].length>=4) return;
    picks[g].push(t);
    el.classList.add("selected");
  }

  update(g);

  if(Object.values(picks).every(x=>x.length===4)){
    prepareThird();
  }
}

function update(g){
  const r=picks[g];
  document.getElementById("rank-"+g).innerHTML=
  `1st ${renderTeam(r[0])}<br>
   2nd ${renderTeam(r[1])}<br>
   3rd ${renderTeam(r[2])}<br>
   4th ${renderTeam(r[3])}`;
}

/* THIRD PLACE */
function prepareThird(){
  const list=document.getElementById("thirdList");
  list.innerHTML="";
  selectedThird=[];

  updateThirdUI();

  Object.values(picks).forEach(g=>{
    const t=g[2];

    const div=document.createElement("div");
    div.className="thirdItem";
    div.innerHTML=renderTeam(t);

    div.onclick=()=>{
      if(selectedThird.includes(t)){
        selectedThird=selectedThird.filter(x=>x!==t);
        div.classList.remove("selected");
      } else if(selectedThird.length<8){
        selectedThird.push(t);
        div.classList.add("selected");
      }
      updateThirdUI();
    };

    list.appendChild(div);
  });

  document.getElementById("thirdUI").style.display="block";
}

function updateThirdUI(){
  document.getElementById("thirdCount").innerText=
    `Selected: ${selectedThird.length} / 8`;

  document.getElementById("buildBtn").disabled=
    selectedThird.length!==8;
}

/* BUILD */
function build(){

  const first=[],second=[];

  Object.values(picks).forEach(g=>{
    first.push(g[0]);
    second.push(g[1]);
  });

  const third=selectedThird;

  const r32=[
    [first[0],third[7]],
    [first[1],third[6]],
    [first[2],second[11]],
    [first[3],second[10]],
    [first[4],third[5]],
    [first[5],third[4]],
    [first[6],second[9]],
    [first[7],second[8]],
    [first[8],third[3]],
    [first[9],third[2]],
    [first[10],second[7]],
    [first[11],second[6]],
    [second[0],second[5]],
    [second[1],second[4]],
    [second[2],third[1]],
    [second[3],third[0]]
  ];

  rounds=[r32.map(m=>({teams:[m[0],m[1]],winner:null}))];

  for(let i=1;i<5;i++){
    rounds[i]=Array(Math.pow(2,5-i)).fill(0)
      .map(()=>({teams:[null,null],winner:null}));
  }

  draw();
}

/* WINNER */
function selectWinner(r,m,i){

  const match=rounds[r][m];
  const winner=match.teams[i];

  match.winner=winner;

  if(r<rounds.length-1){
    const next=Math.floor(m/2);
    const slot=m%2;
    rounds[r+1][next].teams[slot]=winner;
  }

  draw();
  setTimeout(checkFinal,50);
}

/* FINAL */
function checkFinal(){

  const finalRound=rounds.length-1;
  const finalMatch=rounds[finalRound][0];

  if(!finalMatch || !finalMatch.winner) return;

  const A=finalMatch.teams[0];
  const B=finalMatch.teams[1];
  const W=finalMatch.winner;
  const L=W===A?B:A;

  document.getElementById("results").style.display="block";

  document.getElementById("champion").innerHTML=
    "🥇 Champion: "+renderTeam(W);

  document.getElementById("runnerup").innerHTML=
    "🥈 Runner-up: "+renderTeam(L);
}

/* DRAW */
function draw(){
  const b=document.getElementById("bracket");
  b.innerHTML="";

  rounds.forEach((r,ri)=>{
    const col=document.createElement("div");
    col.className="round";

    r.forEach((m,mi)=>{
      const d=document.createElement("div");
      d.className="match";

      d.innerHTML=`
        <div class="slot ${m.winner===m.teams[0]?'winner':''}"
          onclick="selectWinner(${ri},${mi},0)">
          ${renderTeam(m.teams[0])}
        </div>

        <div class="slot ${m.winner===m.teams[1]?'winner':''}"
          onclick="selectWinner(${ri},${mi},1)">
          ${renderTeam(m.teams[1])}
        </div>
      `;

      col.appendChild(d);
    });

    b.appendChild(col);
  });
}

init();

</script>
</body>
</html>
